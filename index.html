<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Just Breath – a calming meditation and breathing app. Your mind deserves rest."
    />
    <title>Just Breath – Your mind deserves rest.</title>

    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />

    <!-- Google Fonts: Cormorant Garamond (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!-- =============================================
         FLOATING SOUND BUTTON  (top-right)
         ============================================= -->
    <button
      class="sound-fab"
      id="sound-fab"
      aria-label="Toggle ambient sound"
      aria-pressed="false"
      title="Ambient Sound"
    >
      <!-- Sound-on icon (default) -->
      <svg class="sound-fab__icon sound-fab__icon--on" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <!-- Sound-off icon (muted state) -->
      <svg class="sound-fab__icon sound-fab__icon--off" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M11 5L6 9H2v6h4l5 4V5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <!-- Ripple element -->
      <span class="sound-fab__ripple" aria-hidden="true"></span>
    </button>

    <!-- =============================================
         HOME SCREEN
         ============================================= -->
    <main class="home" id="home">

      <!-- Decorative background layers -->
      <div class="home__bg" aria-hidden="true">
        <div class="bg-orb bg-orb--1"></div>
        <div class="bg-orb bg-orb--2"></div>
        <div class="bg-orb bg-orb--3"></div>
        <div class="bg-grid"></div>
      </div>

      <!-- Central content card -->
      <div class="home__card" id="home-card">

        <!-- Top decorative ring + breath animation -->
        <div class="home__visual" aria-hidden="true">
          <div class="breath-ring breath-ring--outer"></div>
          <div class="breath-ring breath-ring--mid"></div>
          <div class="breath-circle" id="breath-circle">
            <div class="breath-circle__inner">
              <!-- Lotus / leaf SVG icon -->
              <svg class="breath-circle__logo" viewBox="0 0 80 80" fill="none" aria-hidden="true">
                <circle cx="40" cy="40" r="38" fill="url(#homeGrad)" opacity="0.15"/>
                <!-- Left petal -->
                <path d="M40 20 C25 28 22 46 40 56 C28 48 26 32 40 20Z"
                      fill="url(#petalGrad)" opacity="0.9"/>
                <!-- Right petal -->
                <path d="M40 20 C55 28 58 46 40 56 C52 48 54 32 40 20Z"
                      fill="url(#petalGrad)" opacity="0.7"/>
                <!-- Bottom fill -->
                <ellipse cx="40" cy="56" rx="8" ry="4" fill="url(#petalGrad)" opacity="0.5"/>
                <defs>
                  <linearGradient id="homeGrad" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#C9A84C"/>
                    <stop offset="1" stop-color="#F5D78E"/>
                  </linearGradient>
                  <linearGradient id="petalGrad" x1="40" y1="20" x2="40" y2="60" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#F5D78E"/>
                    <stop offset="1" stop-color="#C9A84C"/>
                  </linearGradient>
                </defs>
              </svg>
            </div>
          </div>
        </div>

        <!-- App title -->
        <header class="home__header">
          <p class="home__eyebrow">welcome</p>
          <h1 class="home__title">
            Just<em>Breath</em>
          </h1>
        </header>

        <!-- Divider line with ornament -->
        <div class="home__divider" aria-hidden="true">
          <span class="home__divider-line"></span>
          <span class="home__divider-dot"></span>
          <span class="home__divider-line"></span>
        </div>

        <!-- Quote -->
        <blockquote class="home__quote" id="home-quote">
          <p>"Your mind deserves rest."</p>
        </blockquote>

        <!-- CTA Buttons -->
        <nav class="home__actions" aria-label="Main actions">
          <button
            class="btn btn--primary"
            id="btn-breathing"
            type="button"
          >
            <svg class="btn__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Start Breathing
          </button>

          <button
            class="btn btn--secondary"
            id="btn-meditation"
            type="button"
          >
            <svg class="btn__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
              <path d="M4 14c0-3.31 2.69-6 6-6s6 2.69 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <circle cx="10" cy="6" r="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M2 17h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Start Meditation
          </button>
        </nav>

        <!-- Bottom ambient indicator bar -->
        <div class="home__ambient-bar" id="ambient-bar" aria-hidden="true">
          <span class="ambient-dot" style="animation-delay: 0s"></span>
          <span class="ambient-dot" style="animation-delay: 0.2s"></span>
          <span class="ambient-dot" style="animation-delay: 0.4s"></span>
          <span class="ambient-dot" style="animation-delay: 0.6s"></span>
          <span class="ambient-dot" style="animation-delay: 0.8s"></span>
          <span class="ambient-dot" style="animation-delay: 1s"></span>
          <span class="ambient-dot" style="animation-delay: 1.2s"></span>
        </div>

      </div><!-- /.home__card -->

      <!-- Bottom tagline -->
      <p class="home__tagline" aria-hidden="true">
        Breathe in calm. Breathe out tension.
      </p>

    </main>

    <script src="script.js"></script>
  </body>
</html>
